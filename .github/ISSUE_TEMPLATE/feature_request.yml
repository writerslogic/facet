name: Feature Request
description: Suggest an idea for Facet
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Facet is strictly privacy-first and cookieless — it stores no cross-session identity and no
        raw IP. Please keep proposals compatible with that model.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is it for (developer, marketer, self-hoster)?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered.
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy compatibility
      options:
        - label: This proposal does not require cross-session identity, cookies, or storing raw IPs.
          required: true
