version: 2

updates:
  # ============================================================================
  # npm / pnpm workspace dependencies
  # ============================================================================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Cloudflare toolchain
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
        update-types:
          - "minor"
          - "patch"
      # Dashboard (React) stack
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
          - "@tanstack/*"
        update-types:
          - "minor"
          - "patch"
      # All other minor/patch updates
      all-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major bumps are reviewed manually via a dedicated chore.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ============================================================================
  # GitHub Actions
  # ============================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "actions/*"
        update-types:
          - "minor"
          - "patch"
