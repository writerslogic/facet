# CI: install, lint, typecheck, and test the Facet monorepo on every push and PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Release-link check (no placeholder repo slugs)
        run: pnpm check:links

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Package check (publint + attw)
        run: pnpm --filter "@writerslogic/*" check:package

      - name: Test
        run: pnpm test
