# misterdev project config for Facet (pnpm monorepo).
# Each target is self-contained: a task's gate is routed to the target that owns
# its files, and ONLY that target's commands run. Top-level commands below apply
# only to files outside every target (root configs like package.json / biome.json).

language: typescript

build:
  # `run --tasks DEVPLAN.md` has no task cap, but raise this so a `build` run
  # (LLM decomposition) never silently drops tasks from the ~100-task plan.
  max_tasks: 120
  # Master dollar ceiling for a run; also settable with --budget. A ~100-task
  # TS+tests build is real spend — run wave-by-wave and adjust deliberately.
  budget: 100.0

orchestrator:
  # Re-run a red test gate once before trusting it: a flaky vitest/miniflare run
  # then can't revert a correct edit. 0 disables; 1 is a safe default here.
  flaky_reruns: 1
  # The DEVPLAN pre-decides files and details, so the agentic MCP filesystem-
  # exploration loop (3 rounds/task) is redundant with the code + symbol context
  # misterdev already supplies — and it dominated the wall-clock on early tasks.
  # Off = go straight to the edit. (Symbol graph + reference sites still apply.)
  mcp_tool_use: false
  mcp_enabled: false
  # Run independent tasks in a wave concurrently, each in its own git worktree.
  # Verified that pnpm gates resolve deps natively in a worktree here. max_workers
  # kept modest so parallel tsc/vitest don't thrash a laptop.
  run_parallel: true
  max_workers: 3

# Independent reviewers: run the review roles on different-family frontier models than the
# Claude generators (opus/sonnet) so the review doesn't share the generator's blind spots
# (resolves the once-per-run "same model that wrote the code" reflection note). critic and
# judge are deliberately DIFFERENT models: the adversarial code critic uses a code-specialized
# model, the acceptance/goal judge uses a general reasoner.
critic:
  model: "openai/gpt-5.1-codex"
judge:
  model: "google/gemini-3.1-pro-preview"

# Files outside every target (root package.json, biome.json, tsconfig.base.json,
# pnpm-workspace.yaml) gate with the root scripts.
lint_command: "pnpm lint"
typecheck_command: "pnpm typecheck"

targets:
  - name: shared
    path: packages/shared
    # No build step; typecheck is the compile gate.
    typecheck_command: "pnpm --filter @facet/shared typecheck"
    test_command: "pnpm --filter @facet/shared test"
    lint_command: "pnpm --filter @facet/shared lint"

  - name: server
    path: apps/server
    # A Worker has no separate build; typecheck + vitest (miniflare) are the gate.
    typecheck_command: "pnpm --filter @facet/server typecheck"
    test_command: "pnpm --filter @facet/server test"
    lint_command: "pnpm --filter @facet/server lint"

  - name: dashboard
    path: apps/dashboard
    build_command: "pnpm --filter @facet/dashboard build"
    typecheck_command: "pnpm --filter @facet/dashboard typecheck"
    test_command: "pnpm --filter @facet/dashboard test"
    lint_command: "pnpm --filter @facet/dashboard lint"

  - name: client
    path: packages/client
    build_command: "pnpm --filter @writerslogic/facet build"
    typecheck_command: "pnpm --filter @writerslogic/facet typecheck"
    test_command: "pnpm --filter @writerslogic/facet test"
    lint_command: "pnpm --filter @writerslogic/facet lint"

  - name: cli
    path: packages/cli
    build_command: "pnpm --filter @writerslogic/facet-cli build"
    typecheck_command: "pnpm --filter @writerslogic/facet-cli typecheck"
    test_command: "pnpm --filter @writerslogic/facet-cli test"
    lint_command: "pnpm --filter @writerslogic/facet-cli lint"
