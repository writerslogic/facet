# Release: on a v* tag, publish the public npm packages (@writerslogic/facet, @writerslogic/facet-cli) with provenance.
# The first step fails fast if NPM_TOKEN is missing, so a mis-provisioned release never half-publishes.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC identity for npm provenance + Sigstore signing
  attestations: write # store the GitHub build-provenance attestation for the packed tarballs

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check credentials
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN missing — set the repository secret before tagging a release."
            exit 1
          fi

      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Pack the exact tarballs that will be published so the build-provenance attestation below
      # covers the same bytes npm receives (pnpm publish packs identically).
      - name: Pack tarballs
        run: |
          mkdir -p dist-tarballs
          pnpm --filter @writerslogic/facet pack --pack-destination "$GITHUB_WORKSPACE/dist-tarballs"
          pnpm --filter @writerslogic/facet-cli pack --pack-destination "$GITHUB_WORKSPACE/dist-tarballs"

      # GitHub-native SLSA build provenance for the tarballs (in addition to npm's own provenance,
      # generated by --provenance below). Signed via the workflow's OIDC identity through Sigstore.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist-tarballs/*.tgz'

      # Software Bill of Materials (SPDX) for the release, attested (Sigstore) against the same tarballs.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: facet-sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: 'dist-tarballs/*.tgz'
          sbom-path: facet-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: facet-sbom.spdx.json
          retention-days: 90

      - name: Publish
        run: pnpm publish --filter @writerslogic/facet --filter @writerslogic/facet-cli --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
